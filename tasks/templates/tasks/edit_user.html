{% extends 'tasks/base.html' %}
{% block title %}Edit Student{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">Edit Student</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Save Changes</button>
    <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">Cancel</a>
  </form>

  <hr>

  <form method="post" action="{% url 'delete_user' user.id %}" onsubmit="return confirm('Are you sure you want to delete this student?');">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger mt-3">Delete Student</button>
  </form>
</div>
{% endblock %}
